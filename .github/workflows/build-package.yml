name: build-package
on:
  workflow_dispatch:
    inputs:
      macos_version:
        type: choice
        description: Select MacOS version
        default: macos-15
        required: true
        options:
          - macos-latest
          - macos-15

      windows_version:
        type: choice
        description: Select Windows version
        default: windows-2022
        required: true
        options:
          - windows-latest
          - windows-2025
          - windows-2022

jobs:
  build-macos:
    runs-on: ${{ github.event.inputs.macos_version }}
    steps:

    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Install dependencies
      run: BUILD_UNIVERSAL=YES bash source/scripts/install_deps.sh

    - name: Build universal externals
      run: |
        mkdir -p build
        cd build
        cmake .. -GXcode -DBUILD_UNIVERSAL=YES
        cmake --build . --config Release

    - name: Upload macOS externals
      uses: actions/upload-artifact@v4
      with:
        name: macos-externals
        path: |
          externals/*.mxo
        retention-days: 1

  build-windows:
    runs-on: ${{ github.event.inputs.windows_version }}
    steps:

    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Install dependencies
      shell: bash
      run: bash source/scripts/install_deps.sh

    - name: Build externals on Windows
      run: |
        mkdir -p build
        cd build
        cmake ..
        cmake --build . --config Release
      shell: bash

    - name: Upload win64 externals
      uses: actions/upload-artifact@v4
      with:
        name: win64-externals
        path: |
          externals/*.mxe64
        retention-days: 1

  build-package:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:

    - uses: actions/checkout@v4

    - name: Download macOS externals
      uses: actions/download-artifact@v4
      with:
        name: macos-externals
        path: externals

    - name: Download Windows externals
      uses: actions/download-artifact@v4
      with:
        name: win64-externals
        path: externals

    - name: Copy scripts to root
      run: cp source/scripts/remove_macos_externals_quarantine.sh .

    - uses: actions/upload-artifact@v4
      with:
        name: data-max
        path: |
            examples
            externals
            help
            media
            patchers
            LICENSE
            README.md
            remove_macos_externals_quarantine.sh
